<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Admin Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #f3f0ff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 30px; color: #2e1065; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .stat-card h2 { font-size: 2.5rem; margin-bottom: 5px; color: #7c3aed; }
        .table-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #f3f0ff; opacity: 0.6; font-size: 0.8rem; }
        td { padding: 15px; border-bottom: 1px solid #f3f0ff; font-size: 0.9rem; }
        .status-pill { padding: 5px 12px; border-radius: 50px; font-weight: 800; font-size: 0.7rem; }
        .status-complete { background: #dcfce7; color: #15803d; }
        .status-running { background: #fef9c3; color: #854d0e; }
        .status-error { background: #fee2e2; color: #b91c1c; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌍 Platform Infrastructure Admin</h1>
    </div>

    <div class="stats-row">
        <div class="stat-card"><h2 id="totalUsers">0</h2><p>Researchers Logged In</p></div>
        <div class="stat-card"><h2 id="totalTasks">0</h2><p>Total Tasks Requested</p></div>
        <div class="stat-card"><h2 id="successRate">0%</h2><p>Overall Success Rate</p></div>
    </div>

    <div class="table-container">
        <h3>Live Activity Feed</h3>
        <table>
            <thead>
                <tr>
                    <th>TASK ID</th>
                    <th>DESCRIPTION</th>
                    <th>STATUS</th>
                    <th>FILES CREATED</th>
                    <th>TIMESTAMP</th>
                </tr>
            </thead>
            <tbody id="taskBody"></tbody>
        </table>
    </div>

    <script>
        async function loadAdminData() {
            // Fetch tasks from your /api/admin/tasks or similar endpoint
            const res = await fetch('/api/tasks'); // Path depends on your app.py DB route
            const tasks = await res.json();
            
            // 1. Calculate Users (Unique set)
            const uniqueUsers = new Set(tasks.map(t => t.user_id)).size;
            document.getElementById('totalUsers').innerText = uniqueUsers || 1;

            // 2. Success Rate
            const successful = tasks.filter(t => t.status === 'complete').length;
            const rate = tasks.length > 0 ? (successful / tasks.length * 100).toFixed(1) : 0;
            document.getElementById('totalTasks').innerText = tasks.length;
            document.getElementById('successRate').innerText = rate + '%';

            // 3. Table Rows
            document.getElementById('taskBody').innerHTML = tasks.map(t => `
                <tr>
                    <td><b>#${t.task_id}</b></td>
                    <td>${t.task_description.substring(0,50)}...</td>
                    <td><span class="status-pill status-${t.status}">${t.status.toUpperCase()}</span></td>
                    <td style="font-size:0.7rem; color:#7c3aed; font-weight:700;">
                        ${t.status === 'complete' ? 'Intel, Findings, Trends, Report, Audit' : '---'}
                    </td>
                    <td>${new Date(t.created_at).toLocaleTimeString()}</td>
                </tr>
            `).join('');
        }

        setInterval(loadAdminData, 5000);
        loadAdminData();
    </script>
</body>
</html>
